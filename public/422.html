<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>422 — Factor Fifty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" href="/icon.png" type="image/png">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0d13;
      color: #e2e8f0;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 24px;
      text-align: center;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-icon svg {
      width: 26px;
      height: 26px;
    }

    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fbbf24;
      line-height: 1;
    }

    .error-title {
      font-size: 18px;
      font-weight: 600;
      color: #e2e8f0;
    }

    .error-desc {
      font-size: 13px;
      color: #94a3b8;
      max-width: 360px;
      line-height: 1.6;
    }

    .error-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      background: #4ade80;
      color: #0a0d13;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .error-home:hover {
      opacity: 0.88;
    }

    .error-home svg {
      width: 14px;
      height: 14px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: absolute;
      top: 16px;
      left: 20px;
    }

    .logo-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
    }

    .logo-bars span {
      width: 3px;
      background: #2ecc71;
      border-radius: 1px;
    }

    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #e2e8f0;
    }
  </style>
</head>

<body>
  <div class="logo">
    <div class="logo-bars">
      <span style="height:7px"></span>
      <span style="height:11px"></span>
      <span style="height:15px"></span>
      <span style="height:18px"></span>
      <span style="height:12px"></span>
    </div>
    <span class="logo-text">Factor Fifty</span>
  </div>

  <div class="error-container">
    <div class="error-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.8">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    </div>
    <div class="error-code">422</div>
    <div class="error-title">Unprocessable request</div>
    <div class="error-desc">The request couldn't be processed. This usually means a security verification failed. Please
      try again.</div>
    <a href="/" class="error-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
      </svg>
      Back to Home
    </a>
  </div>
</body>

</html>
