<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Unsupported Browser — Factor Fifty</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0d13;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 24px;
      text-align: center;
    }

    .error-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-icon svg {
      width: 26px;
      height: 26px;
    }

    .error-code {
      font-family: monospace;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fbbf24;
      line-height: 1;
    }

    .error-title {
      font-size: 18px;
      font-weight: 600;
      color: #e2e8f0;
    }

    .error-desc {
      font-size: 13px;
      color: #94a3b8;
      max-width: 360px;
      line-height: 1.6;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: absolute;
      top: 16px;
      left: 20px;
    }

    .logo-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
    }

    .logo-bars span {
      width: 3px;
      background: #2ecc71;
      border-radius: 1px;
    }

    .logo-text {
      font-family: monospace;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #e2e8f0;
    }
  </style>
</head>

<body>
  <div class="logo">
    <div class="logo-bars">
      <span style="height:7px"></span>
      <span style="height:11px"></span>
      <span style="height:15px"></span>
      <span style="height:18px"></span>
      <span style="height:12px"></span>
    </div>
    <span class="logo-text">Factor Fifty</span>
  </div>

  <div class="error-container">
    <div class="error-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.8">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
    </div>
    <div class="error-code">406</div>
    <div class="error-title">Browser not supported</div>
    <div class="error-desc">Factor Fifty requires a modern browser. Please upgrade to the latest version of Chrome,
      Firefox, Safari, or Edge.</div>
  </div>
</body>

</html>
