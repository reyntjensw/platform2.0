# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

require:
  - rubocop-rails

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  Exclude:
    - "bin/**/*"
    - "db/schema.rb"
    - "node_modules/**/*"
    - "vendor/**/*"
    - "tmp/**/*"

# ── Rails cops ──────────────────────────────────────────

Rails:
  Enabled: true

Rails/DynamicFindBy:
  Enabled: true

Rails/HasManyOrHasOneDependent:
  Enabled: true

Rails/I18nLocaleTexts:
  Enabled: false

Rails/InverseOf:
  Enabled: true

Rails/LexicallyScopedActionFilter:
  Enabled: true

Rails/Output:
  Enabled: true

Rails/RedundantPresenceValidationOnBelongsTo:
  Enabled: true

Rails/SkipsModelValidations:
  Enabled: true
  AllowedMethods:
    - touch
    - update_column

Rails/UnknownEnv:
  Environments:
    - production
    - development
    - test

# ── Style overrides ────────────────────────────────────

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/SymbolArray:
  EnforcedStyle: brackets

# ── Metrics ─────────────────────────────────────────────

Metrics/ClassLength:
  Max: 150

Metrics/MethodLength:
  Max: 25

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "config/routes.rb"
    - "config/environments/*.rb"
